# Write a playbook, play-vars.yml, using global variables that print the target's
# distribution name and major version

---
- name: Print distribution name and major version
  hosts: localhost
  become: yes

  tasks:
    - name: Os version
      debug:
        msg: "{{ ansible_distribution  }}"
    
    - name: distribution_major_version
      debug:
        msg: "{{ ansible_distribution_major_version }}"

